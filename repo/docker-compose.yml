services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: >
        mongosh --eval "
          try {
            rs.status().ok && 1
          } catch(e) {
            rs.initiate({_id:'rs0', members:[{_id:0, host:'mongodb:27017'}]}) && 1
          }
        "
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/motorlot?replicaSet=rs0&directConnection=true
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=motorlot-jwt-secret-key-2024-dev
      - JWT_REFRESH_SECRET=motorlot-jwt-refresh-secret-key-2024-dev
      - HMAC_SECRET=motorlot-hmac-shared-secret-key-2024-dev
      - MASTER_ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      - UPLOAD_DIR=/app/uploads
      - QUARANTINE_DIR=/app/quarantine
      - LOG_LEVEL=info
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - upload_data:/app/uploads
      - quarantine_data:/app/quarantine

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api/v1
      - VITE_HMAC_SECRET=motorlot-hmac-shared-secret-key-2024-dev
    depends_on:
      - server

volumes:
  mongodb_data:
  upload_data:
  quarantine_data:
